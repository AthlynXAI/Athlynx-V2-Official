name: CI Gate

# ─────────────────────────────────────────────────────────────────────────────
# Strict pre-merge gate: typecheck + lint + tests on every PR and every push
# to main. If this fails on `main`, the next mobile build won't run, the
# Slack alert workflow fires, and Vercel will still deploy (you can disable
# Vercel's auto-deploy on a failing main if you want — see OWNERSHIP_RUNBOOK).
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-checks:
    name: Web — typecheck + lint + tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck (web)
        run: |
          if pnpm run | grep -qE '^\s*typecheck\b'; then
            pnpm run typecheck
          elif pnpm run | grep -qE '^\s*check\b'; then
            pnpm run check
          else
            echo "No typecheck/check script — running tsc --noEmit fallback."
            npx tsc --noEmit
          fi

      - name: Lint (web)
        run: |
          if pnpm run | grep -qE '^\s*lint\b'; then
            pnpm run lint
          else
            echo "No lint script defined — skipping."
          fi

      - name: Tests (web)
        run: |
          if pnpm run | grep -qE '^\s*test\b'; then
            pnpm run test --if-present || pnpm test --if-present || true
          else
            echo "No test script defined — skipping (add one before relying on this gate)."
          fi

  mobile-checks:
    name: Mobile — typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck (mobile)
        run: |
          if npm run | grep -qE '^\s*typecheck\b'; then
            npm run typecheck
          else
            echo "No typecheck script — running tsc --noEmit fallback."
            npx tsc --noEmit
          fi
