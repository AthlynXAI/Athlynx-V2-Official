name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
      safe_branch: ${{ steps.sanitize.outputs.safe }}
      neon_branch: ${{ steps.sanitize.outputs.neon_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8
      - name: Sanitize branch name for Neon
        id: sanitize
        run: |
          # Neon branch names cannot contain forward slashes or many special chars.
          # Replace anything non-alphanumeric or hyphen with a hyphen, collapse repeats,
          # trim leading/trailing hyphens, and cap length at 63 (Neon limit).
          RAW="${{ steps.branch_name.outputs.current_branch }}"
          SAFE=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | sed -e 's/[^a-z0-9-]/-/g' -e 's/--*/-/g' -e 's/^-//' -e 's/-$//' | cut -c1-50)
          NEON_BRANCH="preview/pr-${{ github.event.number }}-${SAFE}"
          echo "safe=$SAFE" >> "$GITHUB_OUTPUT"
          echo "neon_branch=$NEON_BRANCH" >> "$GITHUB_OUTPUT"
          echo "Raw branch: $RAW"
          echo "Sanitized:  $SAFE"
          echo "Neon name:  $NEON_BRANCH"

  create_neon_branch:
    name: Create Neon Branch
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
      db_url_with_pooler: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Get branch expiration date as an env variable (2 weeks from now)
        id: get_expiration_date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ needs.setup.outputs.neon_branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Install neonctl
        run: npm i -g neonctl@latest
      - name: Delete Neon Branch (tolerate missing)
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          BRANCH_NAME: ${{ needs.setup.outputs.neon_branch }}
        run: |
          set +e
          echo "Looking for Neon branch: $BRANCH_NAME"
          # Check existence via neonctl; only delete if found.
          EXISTS=$(neonctl branches list --project-id "$NEON_PROJECT_ID" --output json 2>/dev/null | \
            python3 -c "import json,sys,os; bs=json.load(sys.stdin); name=os.environ['BRANCH_NAME']; print('yes' if any(b.get('name')==name for b in bs) else 'no')")
          if [ "$EXISTS" = "yes" ]; then
            echo "Branch exists — deleting."
            neonctl branches delete "$BRANCH_NAME" --project-id "$NEON_PROJECT_ID"
            exit $?
          else
            echo "Branch $BRANCH_NAME not found (likely never created or already pruned). Skipping delete — no failure."
            exit 0
          fi
