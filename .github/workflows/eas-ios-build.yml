name: EAS iOS build & TestFlight submit

# ─────────────────────────────────────────────────────────────────────────────
# Auto-iOS pipeline: pushes to main that touch the mobile app build a fresh
# iOS IPA on EAS and submit it to TestFlight automatically.
#
# Required GitHub repo secrets:
#   - EXPO_TOKEN              (Expo account token — athlynxai org, token name: AthlynX New Build)
#   - ASC_API_KEY_P8          (Raw contents of AuthKey_EHRBJCMPF087.p8)
#   - ASC_API_KEY_ID          (EHRBJCMPF087)
#   - ASC_API_KEY_ISSUER_ID   (ba530e88-4441-4029-bc5a-853abab91a91)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/eas-ios-build.yml'
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: production
        type: choice
        options: [production, preview, development]
      submit_to_testflight:
        description: "Submit the resulting IPA to TestFlight"
        required: true
        default: true
        type: boolean

concurrency:
  group: eas-ios-build
  cancel-in-progress: false

jobs:
  build-and-submit:
    name: iOS build (${{ inputs.profile || 'production' }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: mobile
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Verify required secrets
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "::error::EXPO_TOKEN secret is not set."
            exit 1
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.submit_to_testflight }}" = "true" ]; then
            missing=()
            [ -z "${ASC_API_KEY_P8}" ] && missing+=("ASC_API_KEY_P8")
            [ -z "${ASC_API_KEY_ID}" ] && missing+=("ASC_API_KEY_ID")
            [ -z "${ASC_API_KEY_ISSUER_ID}" ] && missing+=("ASC_API_KEY_ISSUER_ID")
            if [ ${#missing[@]} -gt 0 ]; then
              echo "::error::TestFlight submission requested but secrets missing: ${missing[*]}"
              exit 1
            fi
          fi
          echo "Required secrets present."

      - name: Set up Expo / EAS CLI
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Confirm EAS authentication
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli whoami

      - name: Resolve build profile
        id: profile
        run: |
          if [ -n "${{ inputs.profile }}" ]; then
            echo "value=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=production" >> "$GITHUB_OUTPUT"
          fi

      - name: Build iOS on EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
        run: |
          set -euo pipefail
          npx eas-cli build \
            --platform ios \
            --profile "${{ steps.profile.outputs.value }}" \
            --non-interactive

      - name: Should submit to TestFlight?
        id: submit_gate
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            INTENT=true
          elif [ "${{ inputs.submit_to_testflight }}" = "true" ]; then
            INTENT=true
          else
            INTENT=false
          fi
          if [ "$INTENT" = "true" ] && { [ -z "${ASC_API_KEY_P8}" ] || [ -z "${ASC_API_KEY_ID}" ] || [ -z "${ASC_API_KEY_ISSUER_ID}" ]; }; then
            echo "::warning::ASC secrets not all present — skipping TestFlight submission. IPA is available on EAS."
            echo "submit=false" >> "$GITHUB_OUTPUT"
          else
            echo "submit=$INTENT" >> "$GITHUB_OUTPUT"
          fi

      - name: Write App Store Connect API key (.p8)
        if: steps.submit_gate.outputs.submit == 'true'
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          set -euo pipefail
          umask 077
          KEY_PATH="AuthKey_${ASC_API_KEY_ID}.p8"
          # Write key — preserve exact content including headers and line endings
          printf '%s\n' "${ASC_API_KEY_P8}" > "${KEY_PATH}"
          if [ ! -s "${KEY_PATH}" ]; then
            echo "::error::ASC_API_KEY_P8 wrote an empty file."
            exit 1
          fi
          if ! grep -q "PRIVATE KEY" "${KEY_PATH}"; then
            echo "::error::ASC_API_KEY_P8 does not look like a valid .p8 key (missing PRIVATE KEY header)."
            exit 1
          fi
          echo "Key file written: ${KEY_PATH} ($(wc -c < "${KEY_PATH}") bytes)"
          # Patch eas.json to use exact key path/ID/issuer from secrets
          # IMPORTANT: Do NOT include appleId — it conflicts with API key auth
          node -e "
            const fs = require('fs');
            const eas = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
            eas.submit = eas.submit || {};
            eas.submit.production = eas.submit.production || {};
            eas.submit.production.ios = eas.submit.production.ios || {};
            eas.submit.production.ios.ascApiKeyPath = './AuthKey_' + process.env.ASC_API_KEY_ID + '.p8';
            eas.submit.production.ios.ascApiKeyId = process.env.ASC_API_KEY_ID;
            eas.submit.production.ios.ascApiKeyIssuerId = process.env.ASC_API_KEY_ISSUER_ID;
            delete eas.submit.production.ios.appleId;
            fs.writeFileSync('eas.json', JSON.stringify(eas, null, 2) + '\n');
            console.log('eas.json patched — ascApiKeyId:', process.env.ASC_API_KEY_ID);
          "

      - name: Submit latest iOS build to TestFlight
        if: steps.submit_gate.outputs.submit == 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          set -euo pipefail
          # --no-wait: schedule submission and exit immediately (don't wait for Apple to process)
          # This prevents false failures when Apple takes >20s to respond
          npx eas-cli submit \
            --platform ios \
            --profile "${{ steps.profile.outputs.value }}" \
            --latest \
            --non-interactive \
            --no-wait
          echo "✅ iOS submission scheduled successfully. Check App Store Connect for processing status."

      - name: Remove ASC API key file
        if: always() && steps.submit_gate.outputs.submit == 'true'
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          if [ -n "${ASC_API_KEY_ID}" ]; then
            rm -f "AuthKey_${ASC_API_KEY_ID}.p8"
            rm -f AuthKey_*.p8
          fi
