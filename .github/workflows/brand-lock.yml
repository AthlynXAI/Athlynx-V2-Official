name: Brand Lock

# AthlynX Brand Lock — STRICT enforcement of cobalt + true black + white.
# NO yellow, NO amber, NO gold, NO orange anywhere in client/src.
# NO carve-outs. NO exceptions. NCAA team colors with gold/orange tones
# must be cobalt or removed.
#
# Owner mandate (2026-06-09): "Yes but no exceptions I want it how I told you
# that's final. I'm the boss I pay you."
#
# This workflow MUST be a required status check on the main branch protection rules.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  brand-lock:
    runs-on: ubuntu-latest
    name: STRICT — no yellow/amber/gold/orange anywhere in client/src
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Scan entire client/src for banned colors
        shell: bash
        run: |
          set -uo pipefail

          # Banned Tailwind classes: yellow, amber, gold, orange (any shade, any opacity)
          BANNED='(^|[^a-zA-Z-])(bg|text|from|to|via|border|ring|fill|stroke|shadow|outline|decoration|placeholder|caret|divide|accent|hover:bg|hover:text|hover:from|hover:to|hover:border|hover:ring|focus:bg|focus:text|focus:from|focus:to|focus:border|focus:ring|group-hover:bg|group-hover:text)-(yellow|amber|gold|orange)(-[0-9]{2,3})?(/[0-9]{1,3})?'

          # Banned hex colors: gold/yellow/orange variants
          BANNED_HEX='#(FFC[0-9A-F]{3}|FFD[0-9A-F]{3}|FFE[0-9A-F]{3}|FF8C00|DAA520|B8860B|EEDC82|F0E68C|FFD700|FFCC00|FFCB05|FFD100|FFAB00|FFA500|FF6600|FF7F00|FF8800)'

          echo "Scanning client/src for brand-lock violations..."
          echo ""

          VIOLATIONS=$(grep -rEn "$BANNED|$BANNED_HEX" client/src 2>/dev/null || true)

          if [ -n "$VIOLATIONS" ]; then
            COUNT=$(echo "$VIOLATIONS" | wc -l)
            echo "❌ BRAND LOCK VIOLATION — $COUNT line(s):"
            echo ""
            echo "$VIOLATIONS"
            echo ""
            echo "════════════════════════════════════════════════════════════"
            echo "AthlynX brand is cobalt (#1E90FF / blue-400..600) + true black"
            echo "+ white. NO yellow, NO amber, NO gold, NO orange — anywhere."
            echo ""
            echo "Replace with the cobalt equivalent (e.g. text-yellow-400 →"
            echo "text-blue-400). NCAA team secondary colors that are gold/orange"
            echo "must use cobalt instead."
            echo "════════════════════════════════════════════════════════════"
            exit 1
          fi

          echo "✓ Brand lock clean — entire client/src is yellow/amber/gold/orange free"
