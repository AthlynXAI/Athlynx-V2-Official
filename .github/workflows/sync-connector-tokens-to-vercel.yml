name: Sync connector tokens to Vercel

# ─────────────────────────────────────────────────────────────────────────────
# Mirrors GitHub repo secrets for the Autonomous Social OS connectors into the
# Vercel project `athlynx-platform` (production environment).
#
# Tokens synced:
#   - BUFFER_ACCESS_TOKEN  (Buffer publishing API)
#   - ZAPIER_MCP_TOKEN     (Zapier MCP bearer)
#   - ZAPIER_MCP_URL       (Zapier MCP connect URL)
#
# Required GitHub repo secrets:
#   - BUFFER_ACCESS_TOKEN
#   - ZAPIER_MCP_TOKEN
#   - ZAPIER_MCP_URL
#   - VERCEL_TOKEN
#   - VERCEL_ORG_ID
#   - VERCEL_PROJECT_ID
#
# Does NOT redeploy. Next push to main (or manual redeploy) picks up new env.
# Posting still gated behind SOCIAL_POSTING_ENABLED.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/sync-connector-tokens-to-vercel.yml"

concurrency:
  group: sync-connector-tokens
  cancel-in-progress: false

jobs:
  sync:
    name: Push connector tokens to Vercel production env
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - name: Guard — required secrets present
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          ZAPIER_MCP_TOKEN: ${{ secrets.ZAPIER_MCP_TOKEN }}
          ZAPIER_MCP_URL: ${{ secrets.ZAPIER_MCP_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=""
          [ -z "$BUFFER_ACCESS_TOKEN" ] && missing="$missing BUFFER_ACCESS_TOKEN"
          [ -z "$ZAPIER_MCP_TOKEN" ]    && missing="$missing ZAPIER_MCP_TOKEN"
          [ -z "$ZAPIER_MCP_URL" ]      && missing="$missing ZAPIER_MCP_URL"
          [ -z "$VERCEL_TOKEN" ]        && missing="$missing VERCEL_TOKEN"
          [ -z "$VERCEL_ORG_ID" ]       && missing="$missing VERCEL_ORG_ID"
          [ -z "$VERCEL_PROJECT_ID" ]   && missing="$missing VERCEL_PROJECT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "All required secrets present."

      - name: Upsert connector tokens in Vercel (production)
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          ZAPIER_MCP_TOKEN: ${{ secrets.ZAPIER_MCP_TOKEN }}
          ZAPIER_MCP_URL: ${{ secrets.ZAPIER_MCP_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json, os, sys, urllib.request, urllib.error, urllib.parse

          api_base = "https://api.vercel.com"
          token = os.environ["VERCEL_TOKEN"]
          org_id = os.environ["VERCEL_ORG_ID"]
          project_id = os.environ["VERCEL_PROJECT_ID"]
          team_query = urllib.parse.urlencode({"teamId": org_id})

          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
          }

          def req(method, path, body=None):
              url = f"{api_base}{path}"
              data = json.dumps(body).encode() if body is not None else None
              r = urllib.request.Request(url, data=data, method=method, headers=headers)
              try:
                  with urllib.request.urlopen(r) as resp:
                      raw = resp.read().decode()
                      return json.loads(raw) if raw else {}
              except urllib.error.HTTPError as e:
                  print(f"::error::{method} {path} -> {e.code}: {e.read().decode()}")
                  raise

          # Fetch existing prod envs once
          envs = req("GET", f"/v9/projects/{project_id}/env?{team_query}").get("envs", [])
          existing_by_key = {}
          for e in envs:
              if "production" in (e.get("target") or []):
                  existing_by_key[e.get("key")] = e.get("id")

          tokens = {
              "BUFFER_ACCESS_TOKEN": os.environ["BUFFER_ACCESS_TOKEN"],
              "ZAPIER_MCP_TOKEN":    os.environ["ZAPIER_MCP_TOKEN"],
              "ZAPIER_MCP_URL":      os.environ["ZAPIER_MCP_URL"],
          }

          for key, value in tokens.items():
              env_id = existing_by_key.get(key)
              if env_id:
                  print(f"Updating existing env var {key} (id={env_id})")
                  req("PATCH", f"/v9/projects/{project_id}/env/{env_id}?{team_query}", {
                      "value": value,
                      "type": "encrypted",
                      "target": ["production"],
                  })
              else:
                  print(f"Creating new env var {key}")
                  req("POST", f"/v10/projects/{project_id}/env?{team_query}", {
                      "key": key,
                      "value": value,
                      "type": "encrypted",
                      "target": ["production"],
                  })

          print("All connector tokens synced to Vercel production env.")
          PY
