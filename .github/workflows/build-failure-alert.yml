name: Build/Deploy failure alert

# ─────────────────────────────────────────────────────────────────────────────
# Fires a Slack alert (and a stdout log line for GitHub Actions) whenever
# any of our key workflows fail. This is the eyes/ears of the autonomous
# pipeline — if something breaks, you get pinged.
#
# Required secret: SLACK_WEBHOOK_URL  (Incoming Webhook for #builds or similar)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows:
      - "CI Gate"
      - "EAS iOS build & TestFlight submit"
      - "EAS Android build & Play Internal submit"
    types: [completed]

jobs:
  alert-on-failure:
    name: Alert on failure
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'cancelled' || github.event.workflow_run.conclusion == 'timed_out' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    steps:
      - name: Compose alert payload
        id: payload
        env:
          WORKFLOW: ${{ github.event.workflow_run.name }}
          STATUS: ${{ github.event.workflow_run.conclusion }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          ACTOR: ${{ github.event.workflow_run.actor.login }}
          URL: ${{ github.event.workflow_run.html_url }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          short_sha="${SHA:0:7}"
          summary="🚨 *${WORKFLOW}* — ${STATUS}"
          details="Repo: \`${REPO}\` · Branch: \`${BRANCH}\` · Commit: \`${short_sha}\` · Actor: ${ACTOR}"
          link="<${URL}|Open run>"
          {
            echo "summary<<EOF"
            echo "${summary}"
            echo "EOF"
            echo "details<<EOF"
            echo "${details}"
            echo "EOF"
            echo "link=${link}"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::${summary} — ${details}"

      - name: Send Slack alert
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SUMMARY: ${{ steps.payload.outputs.summary }}
          DETAILS: ${{ steps.payload.outputs.details }}
          LINK: ${{ steps.payload.outputs.link }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL not set — skipping Slack post. Add it under Settings → Secrets to enable alerts."
            exit 0
          fi
          payload=$(jq -nc \
            --arg summary "$SUMMARY" \
            --arg details "$DETAILS" \
            --arg link "$LINK" \
            '{
              text: $summary,
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: $summary } },
                { type: "context", elements: [ { type: "mrkdwn", text: $details } ] },
                { type: "section", text: { type: "mrkdwn", text: $link } }
              ]
            }')
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL" \
            -o /tmp/slack_resp.txt -w "HTTP %{http_code}\n" || {
              echo "::error::Slack webhook POST failed."
              cat /tmp/slack_resp.txt || true
              exit 1
            }
          cat /tmp/slack_resp.txt || true
