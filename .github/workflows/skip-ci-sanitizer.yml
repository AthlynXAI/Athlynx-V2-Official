name: Skip-CI Sanitizer

# ─────────────────────────────────────────────────────────────────────────────
# Blocks PRs that contain [skip ci] (or any variant) in ANY commit message.
#
# Root cause this prevents:
#   When GitHub squash-merges a PR it concatenates every individual commit
#   message into the merge commit body.  If any of those messages contains a
#   skip-ci token, GitHub Actions skips ALL push-triggered workflows on the
#   resulting main commit — silently killing eas-ios-build, eas-android-build,
#   Vercel deploy, etc.
#
# Tokens blocked (case-insensitive):
#   [skip ci]  [ci skip]  [no ci]  [skip actions]  [actions skip]
#
# Fix: remove the token from the offending commit message before merging.
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-skip-ci-tokens:
    name: No [skip ci] in PR commits
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out PR branch (full history for commit inspection)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Scan all PR commits for skip-ci tokens
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Patterns that GitHub treats as skip-ci signals (case-insensitive)
          PATTERNS=(
            '\[skip ci\]'
            '\[ci skip\]'
            '\[no ci\]'
            '\[skip actions\]'
            '\[actions skip\]'
          )

          FOUND=0

          # Iterate over every commit on this PR (not on base)
          while IFS= read -r sha; do
            MSG=$(git log -1 --format="%B" "$sha")
            for pattern in "${PATTERNS[@]}"; do
              if echo "$MSG" | grep -iqE "$pattern"; then
                echo "::error::Commit $sha contains a skip-ci token matching '$pattern'."
                echo "  Commit message excerpt:"
                echo "$MSG" | head -5 | sed 's/^/    /'
                echo ""
                echo "  Why this matters: GitHub squash-merge pastes all commit messages"
                echo "  into the merge commit body. Any skip-ci token silently suppresses"
                echo "  ALL push-triggered workflows on main (EAS builds, Vercel, etc.)."
                echo ""
                echo "  Fix: amend the commit to remove the '[skip ci]' token, then"
                echo "  force-push the branch."
                FOUND=1
              fi
            done
          done < <(git log --format="%H" "${BASE_SHA}..${HEAD_SHA}")

          if [ "$FOUND" -eq 1 ]; then
            echo "::error::PR blocked: one or more commits contain skip-ci tokens."
            echo "Remove all [skip ci] / [ci skip] / [no ci] / [skip actions] / [actions skip]"
            echo "tokens from commit messages before merging."
            exit 1
          fi

          echo "No skip-ci tokens found in any PR commit. Safe to squash-merge."
